<html lang="en">

<head>
    <title>Griffin Staples</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--These links and scripts are required to use bootstrap-->

    <link href="https://fonts.googleapis.com/css?family=Archivo+Black" rel="stylesheet">
    <link rel="stylesheet" href="../styles/pageTemplate.css">
    <link rel="stylesheet" href="../styles/contact.css">

</head>
<body>
    <div class="pageContainer">

        <!--Header-->
        <div class="row header">
            <div class="col headerName">
                <a href="landing.html">Griffin</a>
            </div>
            <div class="col text-right">
                <div class="headerGroup">
                    <a class="headerTabs" href="about.html">About</a>
                    <a class="headerTabs" href="projects.html">Projects</a>
                    <a class="headerTabs" href="contact.html">Contact</a>
                </div>
            </div>
        </div>
        <!---->
        
        <!-- Body -->
        <div class="row content">
        
            <!-- Body Header -->
            <div class="row" style="width:100%;">
                <div class="pageTitle">
                    Contact
                </div>
            </div>
            <!---->

            <div class="row" style="width:100%;">
                <div class="contactForm">
                    <form action="https://formspree.io/f/xqkgloga"
                      method="POST"
                    >
                        <label>
                            Name:
                            <input type="text" name="name" placeholder="Enter full name here">
                        </label>
                        <label>
                        Company:
                            <input type="text" name="company" placeholder="Enter company name here">
                        </label>
                        <label>
                        Phone Number:
                            <input type="text" name="number" placeholder="Enter number here">
                        <label>
                        Email:
                            <input type="text" name="email" placeholder="Enter email here">
                        </label>
                        <label>
                            Your message:
                            <div style="height:5px;"></div>
                            <textarea name="message" placeholder="Enter your message here"></textarea>
                        </label>
                        <br>
                      <button type="submit">Send</button>
                    </form>
                </div>
            </div>
        </div>
        <!---->
            
        <!--Footer-->
        <div class="row footer">
            <div class="footerContent">
                <div style="width:100%;">
                    <div class="iconList">
                        <a href="https://www.github.com/griffstaples" target="_blank" rel="noopener noreferrer">
                            <img class="icon" src="../images/github.png">
                        </a>
                        <a href="https://www.linkedin.com/in/griffinstaples" target="_blank" rel="noopener noreferrer">
                            <img class="icon" src="../images/linkedin.png">
                        </a>
                    </div>
                </div>
                <div class="attribution">
                    <a href="https://iconscout.com/icons/linkedin" target="_blank" rel="noopener noreferrer">Linkedin Icon</a> and <a href="https://iconscout.com/icons/github" target="_blank" rel="noopener noreferrer">Github Icon</a> by <a href="https://iconscout.com/contributors/alfredo-hernandez" target="_blank" rel="noopener noreferrer">Alfredo Hernandez</a> on <a href="https://iconscout.com" target="_blank" rel="noopener noreferrer">Iconscout</a>
                </div>
            </div>
        </div>
        <!---->
            
    </div>
